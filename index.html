<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mellissa Zhao Portfolio</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 40px;
      background: white;
      color: black;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p.intro {
      font-size: 18px;
      margin-bottom: 40px;
      max-width: 600px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .gallery img {
      width: 100%;
      height: auto;
      display: block;
    }

    .art-item p {
      margin-top: 8px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>Mellissa Zhao</h1>
  <p class="intro">
    Illustrator and visual artist. A selection of my recent works.
  </p>

  <div class="gallery">
    <div class="art-item">
      <img src="images/art1.JPG" alt="Artwork 1">
      <p>Artwork Title 1</p>
    </div>

    <div class="art-item">
      <img src="images/art2.JPG" alt="Artwork 2">
      <p>Artwork Title 2</p>
    </div>

    <div class="art-item">
      <img src="images/art3.JPG" alt="Artwork 3">
      <p>Artwork Title 3</p>
    </div>

    <div class="art-item">
      <img src="images/art4.JPG" alt="Artwork 4">
      <p>Artwork Title 4</p>
    </div>
  </div>
</body>
</html>
