<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artwork Detail</title>
  <style>
    :root {
      --bg: #050505;
      --panel: #111111;
      --text: #f5f2ea;
      --muted: rgba(245, 242, 234, 0.68);
      --line: rgba(245, 242, 234, 0.12);
      --chip: rgba(255, 255, 255, 0.04);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Avenir Next", "Helvetica Neue", Helvetica, Arial, sans-serif;
      opacity: 1;
      overflow-x: hidden;
    }

    body.is-entering .page {
      opacity: 0;
      transform: translateX(72px);
    }

    body.is-ready .page {
      opacity: 1;
      transform: translateX(0);
    }

    body.is-sliding-out .page {
      opacity: 0;
      transform: translateX(-72px);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .page {
      width: min(1380px, calc(100% - 56px));
      margin: 0 auto;
      padding: 24px 0 56px;
      transition: transform 0.58s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.5s ease;
      will-change: transform, opacity;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
      font-size: 13px;
      color: var(--muted);
    }

    .topbar a:hover,
    .topbar a:focus-visible {
      color: var(--text);
    }

    .viewer {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 0.66fr);
      gap: 44px;
      align-items: start;
      min-height: calc(100vh - 120px);
    }

    .info-panel {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      min-height: calc(100vh - 160px);
      padding: 8px 0 0;
      order: 2;
    }

    .info-top {
      max-width: 520px;
      margin-top: auto;
      padding-bottom: 22px;
    }

    .art-title {
      margin: 0;
      font-size: clamp(22px, 2.5vw, 34px);
      line-height: 0.98;
      font-weight: 400;
      letter-spacing: -0.03em;
    }

    .art-description {
      margin: 22px 0 0;
      max-width: 420px;
    }

    .art-description p {
      margin: 0 0 4px;
      font-size: 15px;
      line-height: 1.32;
      color: var(--muted);
    }

    .art-description p:last-child {
      margin-bottom: 0;
    }

    .art-date {
      margin: 22px 0 0;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text);
    }

    .info-bottom {
      padding-top: 26px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 20px;
    }

    .next-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .next-label {
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .art-stage {
      min-height: calc(100vh - 160px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      order: 1;
    }

    .art-frame {
      width: 100%;
      max-width: 680px;
      background: #d8d8d8;
      border-radius: 8px;
      padding: 8px;
    }

    .art-stage img {
      width: 100%;
      height: auto;
      object-fit: contain;
      display: block;
      border-radius: 2px;
    }

    .next-button {
      width: 66px;
      height: 66px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--chip);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      transition: transform 0.25s ease, background 0.25s ease, border-color 0.25s ease;
    }

    .next-button:hover,
    .next-button:focus-visible {
      transform: translateX(4px);
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(245, 242, 234, 0.22);
    }

    .next-button svg {
      width: 28px;
      height: 28px;
      stroke: currentColor;
    }

    @media (max-width: 900px) {
      .viewer {
        grid-template-columns: 1fr;
        gap: 28px;
        min-height: auto;
      }

      .info-panel,
      .art-stage {
        min-height: auto;
        order: initial;
      }

      .art-frame {
        max-width: none;
      }
    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 24px, 1380px);
        padding-top: 18px;
      }

      .topbar {
        margin-bottom: 18px;
      }

      .art-title {
        font-size: 16px;
        margin: 8px 0 0;
      }

      .art-description {
        font-size: 15px;
        margin-top: 4px;
      }

      .art-description p {
        margin: 0 0 2px;
        font-size: 14px;
        line-height: 1.16;
      }

      .viewer {
        display: flex;
        flex-direction: column;
        min-height: auto;
      }

      .art-stage {
        order: 1;
        margin-bottom: 0;
      }

      .art-frame {
        margin-bottom: 0;
      }

      .info-panel {
        order: 3;
        min-height: auto;
        width: 100%;
        max-width: 680px;
        margin: 0 auto;
        padding: 0;
        display: block;
        margin-top: -108px;
      }

      .info-top {
        max-width: 100%;
        margin-top: 0;
        padding-bottom: 0;
      }

      .info-bottom {
        display: none;
      }

      .next-wrap {
        position: static;
        order: 2;
        margin: 0 0 2px;
        align-self: flex-end;
        position: relative;
        z-index: 10;
      }

      .next-button {
        width: 56px;
        height: 56px;
        pointer-events: auto;
      }

      .next-button svg {
        width: 24px;
        height: 24px;
      }

      .next-label {
        display: none;
      }

      .art-date {
        margin-top: 12px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <a href="index.html">Back to portfolio</a>
      <a href="index.html#contact">Contact</a>
    </div>

    <div class="viewer">
      <aside class="info-panel">
        <div class="info-top">
          <h1 class="art-title" id="art-title"></h1>
          <p class="art-description" id="art-description"></p>
          <p class="art-date" id="art-date"></p>
        </div>

        <div class="info-bottom">
          <div class="next-wrap">
            <div class="next-label">Next work</div>
          <a class="next-button" id="next-button" href="#" aria-label="Open next artwork">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M5 12h13"></path>
              <path d="M12 5l7 7-7 7"></path>
            </svg>
          </a>
          </div>
        </div>
      </aside>

      <div class="art-stage">
        <div class="art-frame">
          <img id="art-image" alt="">
        </div>
      </div>
    </div>
  </div>

  <script>
    const works = [
      {
        title: "Work 01",
        date: "2024",
        image: "new/1.jpg",
        alt: "Work 01",
        description: "A quiet composition presented in a clear portfolio format, with the image kept central and the text held back."
      },
      {
        title: "Work 02",
        date: "2024",
        image: "new/2.jpg",
        alt: "Work 02",
        description: "An artwork page focused on clarity, atmosphere, and a slower viewing rhythm."
      },
      {
        title: "Work 03",
        date: "2024",
        image: "new/3.jpg",
        alt: "Work 03",
        description: "A simple presentation that lets the work lead, while the supporting information stays light and controlled."
      },
      {
        title: "Work 04",
        date: "2024",
        image: "new/4.jpg",
        alt: "Work 04",
        description: "A restrained artwork detail view designed to feel professional, minimal, and image-first."
      },
      {
        title: "Work 05",
        date: "2024",
        image: "new/5.jpg",
        alt: "Work 05",
        description: "The page structure is intentionally quiet so attention remains on shape, color, and the internal atmosphere of the piece."
      },
      {
        title: "Work 06",
        date: "2024",
        image: "new/6.jpg",
        alt: "Work 06",
        description: "A clean single-work view with just enough context to guide the viewer without interrupting the image."
      },
      {
        title: "Work 07",
        date: "2024",
        image: "new/7.jpg",
        alt: "Work 07",
        description: "A presentation approach that keeps the experience smooth, spacious, and centered on the artwork."
      },
      {
        title: "Work 08",
        date: "2024",
        image: "new/8.jpg",
        alt: "Work 08",
        description: "The details stay subtle so the work can be read visually first, rather than through heavy page structure."
      },
      {
        title: "Work 09",
        date: "2024",
        image: "new/9.jpg",
        alt: "Work 09",
        description: "A professional portfolio layout that feels direct, clean, and calm while still guiding the viewer through the series."
      },
      {
        title: "Untitled Artwork 09",
        date: "2024",
        image: "new/Untitled_Artwork 9.jpg",
        alt: "Untitled Artwork 09",
        description: "A minimal artwork page with a smooth viewing rhythm and a clear path into the next image."
      },
      {
        title: "Untitled Artwork 10",
        date: "2024",
        image: "new/Untitled_Artwork 10.jpg",
        alt: "Untitled Artwork 10",
        description: "A quieter single-work presentation with restrained text and a stronger focus on the image itself."
      }
    ];

    const params = new URLSearchParams(window.location.search);
    const index = Number(params.get("work") || "1") - 1;
    const work = works[index] || works[0];
    const nextIndex = (index + 1) % works.length;

    document.title = `${work.title} | Mellissa Zhao`;
    document.getElementById("art-image").src = work.image;
    document.getElementById("art-image").alt = work.alt;
    document.getElementById("art-title").textContent = work.title;
    const descriptionNode = document.getElementById("art-description");
    const words = work.description.split(" ");
    const chunkSize = Math.max(1, Math.ceil(words.length / 3));
    descriptionNode.innerHTML = "";

    for (let i = 0; i < words.length; i += chunkSize) {
      const paragraph = document.createElement("p");
      paragraph.textContent = words.slice(i, i + chunkSize).join(" ");
      descriptionNode.appendChild(paragraph);
    }
    document.getElementById("art-date").textContent = work.date;
    const nextButton = document.getElementById("next-button");
    const nextWrap = document.querySelector(".next-wrap");
    const viewer = document.querySelector(".viewer");
    const artStage = document.querySelector(".art-stage");
    const infoBottom = document.querySelector(".info-bottom");
    nextButton.href = `art1-detail.html?work=${nextIndex + 1}`;

    function placeNextButton() {
      if (window.matchMedia("(max-width: 640px)").matches) {
        if (nextWrap.parentElement !== viewer) {
          viewer.insertBefore(nextWrap, document.querySelector(".info-panel"));
        }
      } else if (nextWrap.parentElement !== infoBottom) {
        infoBottom.appendChild(nextWrap);
      }
    }

    placeNextButton();
    window.addEventListener("resize", placeNextButton);

    document.body.classList.add("is-entering");
    window.requestAnimationFrame(() => {
      window.requestAnimationFrame(() => {
        document.body.classList.add("is-ready");
        document.body.classList.remove("is-entering");
      });
    });

    nextButton.addEventListener("click", (event) => {
      event.preventDefault();
      document.body.classList.add("is-sliding-out");
      window.setTimeout(() => {
        window.location.href = nextButton.href;
      }, 420);
    });
  </script>
</body>
</html>
