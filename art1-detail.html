<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artwork Detail</title>
  <style>
    :root {
      --bg: #050505;
      --panel: #111111;
      --text: #f5f2ea;
      --muted: rgba(245, 242, 234, 0.68);
      --line: rgba(245, 242, 234, 0.12);
      --chip: rgba(255, 255, 255, 0.04);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Avenir Next", "Helvetica Neue", Helvetica, Arial, sans-serif;
      opacity: 1;
    }

    body.is-entering .page {
      opacity: 0;
      transform: translateX(72px);
    }

    body.is-ready .page {
      opacity: 1;
      transform: translateX(0);
    }

    body.is-sliding-out .page {
      opacity: 0;
      transform: translateX(-72px);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .page {
      width: min(1380px, calc(100% - 56px));
      margin: 0 auto;
      padding: 24px 0 56px;
      transition: transform 0.58s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.5s ease;
      will-change: transform, opacity;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
      font-size: 13px;
      color: var(--muted);
    }

    .topbar a:hover,
    .topbar a:focus-visible {
      color: var(--text);
    }

    .viewer {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 0.66fr);
      gap: 44px;
      align-items: start;
      min-height: calc(100vh - 120px);
    }

    .viewer-shell {
      position: relative;
    }

    .info-panel {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      min-height: calc(100vh - 160px);
      padding: 8px 0 0;
      order: 2;
    }

    .info-top {
      max-width: 520px;
      margin-top: auto;
      padding-bottom: 22px;
    }

    .art-title {
      margin: 0;
      font-size: clamp(22px, 2.5vw, 34px);
      line-height: 0.98;
      font-weight: 400;
      letter-spacing: -0.03em;
    }

    .art-description {
      margin: 22px 0 0;
      max-width: 420px;
    }

    .art-description p {
      margin: 0 0 4px;
      font-size: 15px;
      line-height: 1.32;
      color: var(--muted);
      white-space: pre-line;
    }

    .art-description p:last-child {
      margin-bottom: 0;
    }

    .art-date {
      margin: 22px 0 0;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text);
    }

    .info-bottom {
      padding-top: 26px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 20px;
    }

    .nav-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 14px;
    }

    .prev-wrap {
      position: fixed;
      left: 24px;
      bottom: 8px;
      z-index: 40;
    }

    .prev-wrap .next-label {
      font-size: 10px;
      letter-spacing: 0.1em;
    }

    .prev-wrap .next-button {
      width: 48px;
      height: 48px;
    }

    .prev-wrap .next-button svg {
      width: 20px;
      height: 20px;
    }

    .next-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .next-label {
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .art-stage {
      min-height: calc(100vh - 160px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      order: 1;
    }

    .art-frame {
      width: 100%;
      max-width: 680px;
      background: #d8d8d8;
      border-radius: 8px;
      padding: 8px;
    }

    .art-stage img {
      width: 100%;
      height: auto;
      object-fit: contain;
      display: block;
      border-radius: 2px;
    }

    .next-button {
      width: 66px;
      height: 66px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--chip);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      transition: transform 0.25s ease, background 0.25s ease, border-color 0.25s ease;
    }

    .next-button:hover,
    .next-button:focus-visible {
      transform: translateX(4px);
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(245, 242, 234, 0.22);
    }

    .next-button svg {
      width: 28px;
      height: 28px;
      stroke: currentColor;
    }

    .prev-button svg {
      transform: scaleX(-1);
    }

    @media (max-width: 900px) {
      .viewer {
        grid-template-columns: 1fr;
        gap: 28px;
        min-height: auto;
      }

      .info-panel,
      .art-stage {
        min-height: auto;
        order: initial;
      }

      .art-frame {
        max-width: none;
      }
    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 24px, 1380px);
        padding-top: 18px;
        overflow-x: clip;
      }

      .topbar {
        margin-bottom: 18px;
      }

      .art-title {
        font-size: 16px;
        margin: 8px 0 0;
      }

      .art-description {
        font-size: 15px;
        margin-top: 4px;
      }

      .art-description p {
        margin: 0 0 2px;
        font-size: 14px;
        line-height: 1.16;
      }

      .viewer {
        display: flex;
        flex-direction: column;
        min-height: auto;
        transition: transform 0.42s cubic-bezier(0.22, 1, 0.36, 1);
        will-change: transform;
      }

      .art-stage {
        order: 1;
        margin-bottom: 0;
        overflow: hidden;
      }

      .art-frame {
        margin-bottom: 0;
      }

      .info-panel {
        order: 3;
        min-height: auto;
        width: 100%;
        max-width: 680px;
        margin: 0 auto;
        padding: 0;
        display: block;
        margin-top: 12px;
      }

      .info-top {
        max-width: 100%;
        margin-top: 0;
        padding-bottom: 0;
        padding-right: 0;
        transform: translateY(-30px);
        margin-bottom: -30px;
      }

      .info-bottom {
        display: block;
        margin-top: 0;
        padding-top: 0;
        border-top: 0;
        position: fixed;
        bottom: 24px;
        right: 16px;
        z-index: 40;
      }

      .next-wrap {
        position: static;
        order: initial;
        margin: 0;
        z-index: auto;
      }

      .nav-wrap {
        gap: 10px;
      }

      .prev-wrap {
        position: fixed;
        left: 16px;
        bottom: 8px;
      }

      .prev-wrap .next-label {
        font-size: 9px;
      }

      .prev-wrap .next-button {
        width: 42px;
        height: 42px;
      }

      .prev-wrap .next-button svg {
        width: 18px;
        height: 18px;
      }

      .nav-wrap .next-wrap:last-child {
        position: fixed;
        right: 16px;
        bottom: 24px;
      }

      .next-button {
        width: 56px;
        height: 56px;
        pointer-events: auto;
      }

      .next-button svg {
        width: 24px;
        height: 24px;
      }

      .next-label {
        display: none;
      }

      .art-date {
        margin-top: 12px;
        font-size: 14px;
      }

      .viewer-shell {
        overflow: hidden;
      }

      .art-stage img {
        transition: opacity 0.2s ease;
        will-change: opacity;
      }

      .art-stage img.is-exiting {
        opacity: 0;
      }

      .art-stage img.is-enter-prep {
        opacity: 0;
        transition: none;
      }

      .art-stage img.is-entering {
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <a href="index.html">Back to portfolio</a>
      <a href="index.html#contact">Contact</a>
    </div>

    <div class="viewer-shell">
      <div class="viewer">
        <aside class="info-panel">
          <div class="info-top">
            <h1 class="art-title" id="art-title"></h1>
            <p class="art-description" id="art-description"></p>
            <p class="art-date" id="art-date"></p>
          </div>

          <div class="info-bottom">
            <div class="nav-wrap">
              <div class="next-wrap prev-wrap">
                <div class="next-label">Back</div>
                <a class="next-button prev-button" id="prev-button" href="#" aria-label="Open previous artwork">
                  <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M5 12h13"></path>
                    <path d="M12 5l7 7-7 7"></path>
                  </svg>
                </a>
              </div>

              <div class="next-wrap">
                <div class="next-label">Next work</div>
                <a class="next-button" id="next-button" href="#" aria-label="Open next artwork">
                  <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M5 12h13"></path>
                    <path d="M12 5l7 7-7 7"></path>
                  </svg>
                </a>
              </div>
            </div>
          </div>

        </aside>

        <div class="art-stage">
          <div class="art-frame">
            <img id="art-image" alt="">
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    const works = [
      {
        title: "Chaotic Dream",
        date: "2025",
        image: "new/1.jpg",
        alt: "Chaotic Dream",
        description: "Born from my experience of Salmon Run, this piece reflects on the fragility of life and the relentless urge to survive in the face of inevitable death."
      },
      {
        title: "Emergency Rescue",
        date: "2025",
        image: "new/2.jpg",
        alt: "Emergency Rescue",
        description: ""
      },
      {
        title: "Decompostion",
        date: "2025",
        image: "new/3.jpg",
        alt: "Decompostion",
        description: "Set in a long-abandoned pool, this piece explores the subconscious through monsters dissecting fears I had not yet recognized"
      },
      {
        title: "West absurdity",
        date: "2023",
        image: "new/4.jpg",
        alt: "West absurdity",
        description: "This piece explores my confusion and shifting beliefs as I moved from the Eastern to the Western country, questioning previously unwavering views on religion, culture and customs and reflecting the uncertainty of my own identity and the third space experience."
      },
      {
        title: "Rumor",
        date: "2022",
        image: "new/5.jpg",
        alt: "Rumor",
        description: "A twisted word\n grows many hands.\n Faceless,\n it lives from mouth to mouth.\n Before truth steps in,\n echoes fill the house."
      },
      {
        title: "Begging",
        date: "2025",
        image: "new/6.jpg",
        alt: "Begging",
        description: "This piece depicts the stark contrast between a homeless man in the subway and a tycoon hiding a corpse, reflecting social disparity and hidden darkness."
      },
      {
        title: "Sushi Monster",
        date: "2022",
        image: "new/7.jpg",
        alt: "Sushi Monster",
        description: "This work reflects the high demands placed on kitchen labor in the restaurant industry, and the way capital shapes food pricing, presentation, and the values behind dining culture."
      },
      {
        title: "Caged Bird",
        date: "2023",
        image: "new/8.jpg",
        alt: "Caged Bird",
        description: "After keeping parrots for several years, I began to question whether animals should live in cages. This work reflects my thoughts on animal rights, captivity, and the responsibility of the owner."
      },
      {
        title: "Dream in the Fish Tank",
        date: "2023",
        image: "new/9.jpg",
        alt: "Dream in the Fish Tank",
        description: "A dream within a dream, exploring the judgment, tension, and self-examination of my inner desires."
      },
      {
        title: "Pink Dream",
        date: "2025",
        image: "new/Untitled_Artwork 9.jpg",
        alt: "Pink Dream",
        description: "A dream-like work that explores lust, inner desire, fear, satisfaction, and the complex tension between these emotions."
      },
      {
        title: "SuperEgo",
        date: "2025",
        image: "new/Untitled_Artwork 10.jpg",
        alt: "SuperEgo",
        description: "This work explores the role of the soul and spirit beyond the physical body, both within the inner self and in the outer world. Inspired by Conversations with God by Neale Donald Walsch, it reflects a sense of awe, worship, and fear toward higher dimensions of existence."
      }
    ];

    const viewer = document.querySelector(".viewer");
    const artStage = document.querySelector(".art-stage");
    const artImage = document.getElementById("art-image");
    const artTitle = document.getElementById("art-title");
    const artDescription = document.getElementById("art-description");
    const artDate = document.getElementById("art-date");
    const prevButton = document.getElementById("prev-button");
    const nextButton = document.getElementById("next-button");
    const infoPanel = document.querySelector(".info-panel");
    const infoBottom = document.querySelector(".info-bottom");
    const params = new URLSearchParams(window.location.search);
    const mobileDetailQuery = window.matchMedia("(max-width: 640px)");
    const parsedIndex = Number(params.get("work") || "1") - 1;
    let currentIndex = Number.isInteger(parsedIndex) && parsedIndex >= 0 && parsedIndex < works.length ? parsedIndex : 0;
    let isAnimatingMobileNext = false;

    artImage.decoding = "async";
    artImage.fetchPriority = "high";

    function getDetailImageSrc(src) {
      return mobileDetailQuery.matches ? src.replace("new/", "new/detail-mobile/") : src;
    }

    function updateDescription(container, text) {
      if (!text.trim()) {
        container.innerHTML = "";
        container.style.display = "none";
        return;
      }

      container.style.display = "";
      container.innerHTML = "";
      const paragraph = document.createElement("p");
      paragraph.textContent = text;
      container.appendChild(paragraph);
    }

    function renderWork(workIndex) {
      const work = works[workIndex];
      const prevIndex = (workIndex - 1 + works.length) % works.length;
      const nextIndex = (workIndex + 1) % works.length;

      document.title = `${work.title} | Mellissa Zhao`;
      artImage.src = getDetailImageSrc(work.image);
      artImage.alt = work.alt;
      artTitle.textContent = work.title;
      updateDescription(artDescription, work.description);
      artDate.textContent = work.date;
      prevButton.href = `art1-detail.html?work=${prevIndex + 1}`;
      prevButton.setAttribute("aria-label", `Open ${works[prevIndex].title}`);
      nextButton.href = `art1-detail.html?work=${nextIndex + 1}`;
      nextButton.setAttribute("aria-label", `Open ${works[nextIndex].title}`);
    }

    function getPrevIndex(workIndex) {
      return (workIndex - 1 + works.length) % works.length;
    }

    function getNextIndex(workIndex) {
      return (workIndex + 1) % works.length;
    }

    function preloadWork(workIndex) {
      return new Promise((resolve) => {
        const preloadImage = new Image();
        preloadImage.onload = () => resolve(preloadImage);
        preloadImage.onerror = () => resolve(preloadImage);
        preloadImage.decoding = "async";
        preloadImage.src = getDetailImageSrc(works[workIndex].image);
      });
    }

    renderWork(currentIndex);
    preloadWork(getNextIndex(currentIndex));

    function placeNextButton() {
      if (window.matchMedia("(max-width: 640px)").matches) {
        if (infoBottom.parentElement !== document.body) {
          document.body.appendChild(infoBottom);
        }
      } else if (infoBottom.parentElement !== infoPanel) {
        infoPanel.appendChild(infoBottom);
      }
    }

    placeNextButton();
    window.addEventListener("resize", placeNextButton);
    mobileDetailQuery.addEventListener("change", () => {
      renderWork(currentIndex);
      preloadWork(getNextIndex(currentIndex));
    });

    document.body.classList.add("is-entering");
    window.requestAnimationFrame(() => {
      window.requestAnimationFrame(() => {
        document.body.classList.add("is-ready");
        document.body.classList.remove("is-entering");
      });
    });

    function animateMobileNext() {
      if (isAnimatingMobileNext) {
        return;
      }

      const nextIndex = getNextIndex(currentIndex);
      isAnimatingMobileNext = true;

      preloadWork(nextIndex).then(() => {
        window.setTimeout(() => {
          artImage.classList.add("is-exiting");
        }, 0);

        window.setTimeout(() => {
          currentIndex = nextIndex;
          renderWork(currentIndex);
          artImage.classList.remove("is-exiting");
          artImage.classList.add("is-enter-prep");

          window.requestAnimationFrame(() => {
            window.requestAnimationFrame(() => {
              artImage.classList.remove("is-enter-prep");
              artImage.classList.add("is-entering");
            });
          });
        }, 180);

        window.setTimeout(() => {
          artImage.classList.remove("is-entering");
          history.replaceState(null, "", `art1-detail.html?work=${currentIndex + 1}`);
          preloadWork(getNextIndex(currentIndex));
          isAnimatingMobileNext = false;
        }, 400);
      });
    }

    function animateMobilePrev() {
      if (isAnimatingMobileNext) {
        return;
      }

      const prevIndex = getPrevIndex(currentIndex);
      isAnimatingMobileNext = true;

      preloadWork(prevIndex).then(() => {
        window.setTimeout(() => {
          artImage.classList.add("is-exiting");
        }, 0);

        window.setTimeout(() => {
          currentIndex = prevIndex;
          renderWork(currentIndex);
          artImage.classList.remove("is-exiting");
          artImage.classList.add("is-enter-prep");

          window.requestAnimationFrame(() => {
            window.requestAnimationFrame(() => {
              artImage.classList.remove("is-enter-prep");
              artImage.classList.add("is-entering");
            });
          });
        }, 180);

        window.setTimeout(() => {
          artImage.classList.remove("is-entering");
          history.replaceState(null, "", `art1-detail.html?work=${currentIndex + 1}`);
          preloadWork(getPrevIndex(currentIndex));
          preloadWork(getNextIndex(currentIndex));
          isAnimatingMobileNext = false;
        }, 400);
      });
    }

    prevButton.addEventListener("click", (event) => {
      event.preventDefault();

      if (window.matchMedia("(max-width: 640px)").matches) {
        animateMobilePrev();
        return;
      }

      document.body.classList.add("is-sliding-out");
      window.setTimeout(() => {
        window.location.href = prevButton.href;
      }, 420);
    });

    nextButton.addEventListener("click", (event) => {
      event.preventDefault();

      if (window.matchMedia("(max-width: 640px)").matches) {
        animateMobileNext();
        return;
      }

      document.body.classList.add("is-sliding-out");
      window.setTimeout(() => {
        window.location.href = nextButton.href;
      }, 420);
    });

  </script>
</body>
</html>
